<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Management System</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }

        .header {
            background-color: maroon;
            color: white;
            padding: 20px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
            position: absolute;
            top: 0;
        }

        .header h1 {
            font-size: 36px;
            text-transform: uppercase;
            margin: 0;
        }

        .container {
            text-align: center;
            background-color: white;
            padding: 40px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            width: 80%;
            max-width: 500px;
            margin-top: 100px; /* Adjust this value to control the spacing */
        }

        .container p {
            font-size: 18px;
            margin: 20px 0;
        }

        .btn {
            background-color: black;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            font-size: 16px;
            margin: 10px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #333;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Finance Management System</h1>
    </div>
    <div class="container">
        <p>Welcome to the Finance Management System.</p>
        <p>Manage your finances easily and efficiently.</p>
        <p>Track your income and expenses, and get insightful analysis.</p>
        <a href="login.html" class="btn">Login</a>
        <a href="register.html" class="btn">Register</a>
    </div>
</body>
</html>
<!-- End of main application entry point -->
